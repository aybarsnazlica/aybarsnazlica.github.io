name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JPINKY_REPOSITORY: aybarsnazlica/jpinky
  JPINKY_REF: main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: portfolio-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check out jpinky runtime source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.JPINKY_REPOSITORY }}
          ref: ${{ env.JPINKY_REF }}
          path: jpinky

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Install site dependencies
        run: npm ci

      - name: Build jpinky TeaVM runtime
        working-directory: jpinky
        run: ./gradlew generateJavaScript

      - name: Stage runtime assets for Astro
        run: |
          mkdir -p public/generated/js
          cp jpinky/build/generated/teavm/js/jpinky-runtime.js public/generated/js/
          cp jpinky/build/generated/teavm/js/jpinky-runtime.js.map public/generated/js/

      - name: Build portfolio site
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          SITE_BASE: ${{ github.event.repository.name == 'aybarsnazlica.github.io' && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5